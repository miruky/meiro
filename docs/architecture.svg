<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img"
  aria-labelledby="title desc" font-family="'Hiragino Sans','Noto Sans JP',system-ui,sans-serif">
  <title id="title">meiro のアーキテクチャ</title>
  <desc id="desc">
    設定からシード付き乱数と生成アルゴリズムで生成手順の列を作り、再生ループが壁モデルへ適用してSVG盤面に描く。
    探索器が最短経路と指標を求め、設定はURLとlocalStorageに保存される。
  </desc>
  <style>
    .node { fill: #fbfaf7; stroke: #e2ddd3; }
    .node-accent { fill: #fbfaf7; stroke: #117e6f; }
    .name { fill: #181712; font-size: 16px; font-weight: 700; }
    .sub { fill: #6d6757; font-size: 12.5px; }
    .edge { stroke: #b4aea0; fill: none; }
    .edge-soft { stroke: #cdc8bc; fill: none; stroke-dasharray: 5 5; }
    .flow { fill: #6d6757; font-size: 12px; }
    .arrow { fill: #b4aea0; }
    .arrow-soft { fill: #cdc8bc; }
    @media (prefers-color-scheme: dark) {
      .node { fill: #1c1c17; stroke: #312f27; }
      .node-accent { fill: #1c1c17; stroke: #36b6a3; }
      .name { fill: #f4f1e7; }
      .sub { fill: #9a9484; }
      .edge { stroke: #4a4940; }
      .edge-soft { stroke: #3a392f; }
      .flow { fill: #9a9484; }
      .arrow { fill: #4a4940; }
      .arrow-soft { fill: #3a392f; }
    }
  </style>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="arrow" d="M0 0L10 5L0 10z" />
    </marker>
    <marker id="ah-soft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="arrow-soft" d="M0 0L10 5L0 10z" />
    </marker>
  </defs>

  <!-- edges -->
  <path class="edge" marker-end="url(#ah)" d="M210 189h36" />
  <path class="edge" marker-end="url(#ah)" d="M340 88v58" />
  <path class="edge" marker-end="url(#ah)" d="M430 189h36" />
  <path class="edge" marker-end="url(#ah)" d="M650 189h36" />
  <path class="edge" marker-end="url(#ah)" d="M560 228v68" />
  <path class="edge" marker-end="url(#ah)" d="M650 332h36" />
  <path class="edge" marker-end="url(#ah)" d="M780 296v-64" />
  <path class="edge-soft" marker-end="url(#ah-soft)" marker-start="url(#ah-soft)" d="M120 228v78" />

  <!-- edge labels -->
  <text class="flow" x="448" y="180">CarveStep[]</text>
  <text class="flow" x="568" y="268">applyStep</text>
  <text class="flow" x="788" y="270">指標・解答</text>
  <text class="flow" x="128" y="272">URL / 保存</text>

  <!-- nodes -->
  <g>
    <rect class="node-accent" x="250" y="24" width="180" height="64" rx="13" />
    <text class="name" x="340" y="52" text-anchor="middle">rng.ts</text>
    <text class="sub" x="340" y="72" text-anchor="middle">シード付き乱数</text>
  </g>
  <g>
    <rect class="node" x="30" y="150" width="180" height="78" rx="13" />
    <text class="name" x="120" y="184" text-anchor="middle">設定 (MazeConfig)</text>
    <text class="sub" x="120" y="206" text-anchor="middle">アルゴリズム・大きさ・seed</text>
  </g>
  <g>
    <rect class="node-accent" x="250" y="150" width="180" height="78" rx="13" />
    <text class="name" x="340" y="184" text-anchor="middle">generators.ts</text>
    <text class="sub" x="340" y="206" text-anchor="middle">6つの生成アルゴリズム</text>
  </g>
  <g>
    <rect class="node" x="470" y="150" width="180" height="78" rx="13" />
    <text class="name" x="560" y="184" text-anchor="middle">app.ts</text>
    <text class="sub" x="560" y="206" text-anchor="middle">再生ループ (rAF)</text>
  </g>
  <g>
    <rect class="node" x="690" y="150" width="180" height="78" rx="13" />
    <text class="name" x="780" y="184" text-anchor="middle">SVG 盤面</text>
    <text class="sub" x="780" y="206" text-anchor="middle">walls・head・解答線</text>
  </g>
  <g>
    <rect class="node" x="470" y="296" width="180" height="68" rx="13" />
    <text class="name" x="560" y="326" text-anchor="middle">grid.ts · Maze</text>
    <text class="sub" x="560" y="347" text-anchor="middle">壁ビットのモデル</text>
  </g>
  <g>
    <rect class="node" x="690" y="296" width="180" height="68" rx="13" />
    <text class="name" x="780" y="326" text-anchor="middle">solve.ts</text>
    <text class="sub" x="780" y="347" text-anchor="middle">BFS最短経路・指標</text>
  </g>
  <g>
    <rect class="node" x="30" y="306" width="85" height="58" rx="11" />
    <text class="name" x="72" y="332" text-anchor="middle" font-size="13.5">share.ts</text>
    <text class="sub" x="72" y="350" text-anchor="middle" font-size="11">URL共有</text>
  </g>
  <g>
    <rect class="node" x="125" y="306" width="85" height="58" rx="11" />
    <text class="name" x="167" y="332" text-anchor="middle" font-size="13.5">storage.ts</text>
    <text class="sub" x="167" y="350" text-anchor="middle" font-size="11">localStorage</text>
  </g>
</svg>
